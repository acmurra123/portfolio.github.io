<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Annette Murray</title>
    <link href="/style.css" rel="stylesheet" type="text/css" media="all" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lancelot&family=Trochut:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="landing-body">
    <main class="landing-page">
      <img class="landing-decor-top-right" src="/icons/frameright.svg" alt="" />
      <img class="landing-decor-bottom-left" src="/icons/frameleft.svg" alt="" />

      <section class="landing-content">
        <img
          src="/icons/Annette Murray Logo.svg"
          alt="Annette Murray"
          class="landing-logo"
        />

        <img
          src="/icons/contactheader.svg"
          alt="Annette Murray"
          class="landing-header-graphic"
        />

        <p class="landing-subtitle">cinematography · film · photography</p>

        <p class="landing-text">
          My site is currently being updated.
          <br />
          Full portfolio and cinematography reel coming soon.
        </p>

        <div class="landing-actions">
          <a class="landing-btn landing-btn-primary" href="/contact/">contact</a>
          <a
            class="landing-btn landing-btn-secondary"
            href="https://instagram.com/annettemurrayy"
            target="_blank"
            rel="noopener"
          >
            instagram
          </a>
        </div>

        <p class="landing-note">under maintenance</p>
      </section>
    </main>
  </body>
</html>
